<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ErmaAutoHub{% endblock %}</title>
    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --bg-main: #f4f9fd;
            --bg-soft: #eef7fd;
            --bg-card: #ffffff;
            --bg-accent: #d9eefb;
            --border-main: #cfe4f3;
            --border-soft: #d7e8f5;
            --text-main: #1f3b57;
            --text-heading: #2b587a;
            --text-soft: #5f7d97;
            --link: #2f6f9f;
            --link-hover: #1f5c88;
            --button-main: #8ec5e8;
            --button-main-hover: #78b6de;
            --button-soft: #d9eefb;
            --button-soft-hover: #c8e5f8;
            --danger-bg: #fdeaea;
            --danger-border: #e7bcbc;
            --danger-text: #9b3d3d;
            --success-bg: #e7f6ee;
            --success-border: #bfdcc8;
            --success-text: #2e6a44;
            --shadow-soft: 0 2px 8px rgba(130, 170, 210, 0.12);
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
        }

        a {
            text-decoration: none;
            color: var(--link);
        }

        a:hover {
            color: var(--link-hover);
        }

        img {
            max-width: 100%;
            display: block;
        }

        .container {
            width: 92%;
            max-width: 1180px;
            margin: 0 auto;
        }

        main {
            min-height: 75vh;
            padding: 30px 0;
        }

        .page-title {
            margin: 0 0 20px 0;
            color: var(--text-heading);
        }

        .section-title {
            margin: 0 0 16px 0;
            color: var(--text-heading);
            font-size: 28px;
        }

        .subtitle {
            color: var(--text-soft);
            margin-bottom: 18px;
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-soft);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow-soft);
        }

        .card + .card {
            margin-top: 18px;
        }

        .form-box {
            max-width: 760px;
            margin: 0 auto;
            background-color: var(--bg-card);
            border: 1px solid var(--border-soft);
            border-radius: 12px;
            padding: 25px;
            box-shadow: var(--shadow-soft);
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: var(--text-heading);
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="number"],
        input[type="file"],
        textarea,
        select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #bfd9ec;
            border-radius: 8px;
            background-color: #fafdff;
            color: var(--text-main);
            font-size: 14px;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #7fb4dc;
            background-color: #ffffff;
        }

        input[type="checkbox"] {
            width: auto;
        }

        .form-help {
            margin-top: 5px;
            font-size: 13px;
            color: #6b87a0;
        }

        .form-error {
            margin-top: 5px;
            font-size: 13px;
            color: #b94a48;
        }

        .button {
            display: inline-block;
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            background-color: var(--button-main);
            color: #17344f;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        .button:hover {
            background-color: var(--button-main-hover);
        }

        .button-secondary {
            background-color: var(--button-soft);
        }

        .button-secondary:hover {
            background-color: var(--button-soft-hover);
        }

        .button-danger {
            background-color: #f4c7c7;
        }

        .button-danger:hover {
            background-color: #ecb0b0;
        }

        .actions-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .text-center {
            text-align: center;
        }

        .muted-text {
            color: var(--text-soft);
        }

        .profile-image {
            max-width: 200px;
            border-radius: 10px;
            border: 1px solid var(--border-soft);
            margin-top: 15px;
        }

        .info-row {
            margin-bottom: 10px;
        }

        .info-label {
            font-weight: bold;
            color: var(--text-heading);
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
        }

        .car-card img {
            width: 100%;
            height: 190px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 12px;
            border: 1px solid var(--border-soft);
        }

        .details-grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 24px;
        }

        .empty-message {
            padding: 18px;
            background-color: var(--bg-card);
            border: 1px solid var(--border-soft);
            border-radius: 10px;
            color: #55748f;
        }

        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-grid ul,
        .checkbox-grid > div {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px 18px;
        }

        .checkbox-grid li,
        .checkbox-grid > div > div {
            margin: 0;
        }

        .checkbox-grid label {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            border: 1px solid var(--border-main);
            border-radius: 10px;
            background-color: var(--bg-soft);
            cursor: pointer;
        }

        .checkbox-grid input[type="checkbox"] {
            margin: 0;
        }

        .badge-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .badge-item {
            background-color: var(--bg-soft);
            border: 1px solid var(--border-main);
            color: var(--text-heading);
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 14px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
        }

        .gallery-thumb {
            width: 100%;
            height: 110px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid var(--border-soft);
        }

        .gallery-thumb-large {
            height: 220px;
            margin-bottom: 12px;
        }

        .alert {
            padding: 12px 14px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .alert-success {
            background-color: var(--success-bg);
            border: 1px solid var(--success-border);
            color: var(--success-text);
        }

        .alert-error,
        .alert-danger {
            background-color: var(--danger-bg);
            border: 1px solid var(--danger-border);
            color: var(--danger-text);
        }

        .alert-info {
            background-color: #e3f2fd;
            border: 1px solid #b9d9ef;
            color: #245074;
        }

        .filters-row-3,
        .filters-row-4 {
            display: grid;
            gap: 20px;
            margin-bottom: 20px;
        }

        .filters-row-3 {
            grid-template-columns: repeat(3, 1fr);
        }

        .filters-row-4 {
            grid-template-columns: repeat(4, 1fr);
        }

        .filters-sort {
            max-width: 320px;
            margin-bottom: 20px;
        }

        .results-summary {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 18px;
            color: #5f7d97;
            text-align: right;
        }

        .table-like {
            display: grid;
            gap: 14px;
        }

        .divider {
            height: 1px;
            background-color: var(--border-soft);
            margin: 18px 0;
        }

        .navbar-shell {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 12px;
            width: 100%;
        }

        .navbar-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            width: 100%;
        }

        .navbar-brand {
            font-size: 22px;
            font-weight: bold;
            color: #2b587a;
            text-decoration: none;
        }

        .navbar-brand-wrap {
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .navbar-logo {
            width: 96px;
            height: 58px;
            object-fit: cover;
            border-radius: 14px;
            border: 2px solid #b7d5e8;
            box-shadow: 0 4px 10px rgba(43, 88, 122, 0.12);
        }

        .top-nav {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: flex-end;
            width: 100%;
        }

        .nav-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 9px 12px;
            border-radius: 10px;
            background-color: #edf7fd;
            border: 1px solid #bdd9ec;
            color: #244b68;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            line-height: 1.2;
            transition: all 0.25s ease;
            cursor: pointer;
            position: relative;
            white-space: nowrap;
        }

        .top-nav .nav-btn:hover {
            background-color: #cfe8f8;
            border-color: #9ec7e2;
            color: #16384f;
            transform: translateY(-1px);
        }

        .top-nav .nav-btn:focus {
            outline: none;
        }

        .top-nav .nav-btn:focus-visible {
            background-color: #d7ecfa;
            border-color: #5f93bb;
            color: #16384f;
            outline: 3px solid #17344f;
            outline-offset: 3px;
            transform: translateY(-1px);
        }

        .top-nav .nav-btn.active {
            background-color: #5d8fb7;
            border-color: #3f7098;
            color: #ffffff;
            text-decoration: underline;
            text-decoration-thickness: 2px;
            text-underline-offset: 4px;
            box-shadow: inset 0 -3px 0 #17344f;
        }

        .top-nav .nav-btn.active:hover,
        .top-nav .nav-btn.active:focus-visible {
            background-color: #507fa5;
            border-color: #37658b;
            color: #ffffff;
            outline-color: #17344f;
        }

        .nav-user {
            display: inline-flex;
            align-items: center;
            padding: 9px 12px;
            border-radius: 10px;
            background-color: #d7ecfa;
            border: 1px solid #9ec7e2;
            color: #1f4f72;
            font-size: 14px;
            font-weight: 700;
            line-height: 1.2;
            margin-left: auto;
        }

        .logout-form {
            margin: 0;
        }

        .logout-btn {
            font-family: inherit;
            font-size: 15px;
        }

        @media (max-width: 992px) {
            .filters-row-4 {
                grid-template-columns: repeat(2, 1fr);
            }

            .filters-row-3 {
                grid-template-columns: repeat(2, 1fr);
            }

            .details-grid {
                grid-template-columns: 1fr;
            }

            .top-nav {
                justify-content: flex-start;
            }
        }

        @media (max-width: 600px) {
            .container {
                width: 95%;
            }

            .form-box {
                padding: 20px;
            }

            .filters-row-3,
            .filters-row-4 {
                grid-template-columns: 1fr;
            }

            .filters-sort {
                max-width: 100%;
            }

            .checkbox-grid ul,
            .checkbox-grid > div {
                grid-template-columns: 1fr;
            }

            .nav-btn {
                padding: 9px 14px;
            }

            .navbar-head {
                flex-direction: column;
                align-items: flex-start;
            }

            .navbar-logo {
                width: 82px;
                height: 52px;
            }

            .nav-user {
                margin-left: 0;
            }

            .main-content {
                padding: 30px 0;
            }
        }
    </style>
</head>
<body>
    {% include 'includes/navbar.html' %}

    <main>
        <div class="container">
            {% include 'includes/messages.html' %}
            {% block content %}{% endblock %}
        </div>
    </main>

    {% include 'includes/footer.html' %}
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            document.querySelectorAll('select[data-brand-select="true"]').forEach(function (brandSelect) {
                const form = brandSelect.form || brandSelect.closest('form');
                const modelSelect = form ? form.querySelector('select[data-model-select="true"]') : null;

                if (!modelSelect) return;

                const options = Array.from(modelSelect.options).map(function (option) {
                    return option.cloneNode(true);
                });

                const updateModels = function () {
                    const selectedBrandId = brandSelect.value;
                    const selectedModel = modelSelect.value;

                    modelSelect.innerHTML = '';

                    options.forEach(function (option) {
                        const brandId = option.dataset.brandId || '';

                        if (!brandId || brandId === selectedBrandId) {
                            modelSelect.appendChild(option.cloneNode(true));
                        }
                    });

                    if ([].some.call(modelSelect.options, function (option) { return option.value === selectedModel; })) {
                        modelSelect.value = selectedModel;
                    } else {
                        modelSelect.value = '';
                    }
                };

                updateModels();
                brandSelect.addEventListener('change', updateModels);
            });
        });
    </script>
</body>
</html>
